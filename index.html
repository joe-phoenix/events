<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Africa Events — Pan-African Calendar</title>
  <meta name="description" content="A pan-African events calendar covering technology, business, culture, media, policy and more across the continent." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8fafc; color: #1e293b; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* HEADER */
    #app-header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 28px; box-shadow: 0 1px 3px rgba(0,0,0,.04); position: sticky; top: 0; z-index: 50; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo-wrap { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg,#2563eb,#60a5fa); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .logo-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #1e293b; line-height: 1; }
    .logo-sub { font-size: 10px; color: #94a3b8; letter-spacing: .07em; text-transform: uppercase; margin-top: 1px; }
    .view-toggle { display: flex; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; padding: 3px; }
    .view-btn { padding: 7px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; background: transparent; color: #94a3b8; font-family: inherit; }
    .view-btn.active { background: #2563eb; color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .demo-badge { font-size: 11px; color: #94a3b8; background: #f8fafc; padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0; }

    /* MAIN */
    #main { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }

    /* FILTER BAR */
    .filter-bar { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 18px; margin-bottom: 22px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .search-wrap { position: relative; display: inline-block; }
    .search-wrap::before { content: "🔍"; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; }
    .search-input { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px 8px 36px; color: #1e293b; font-size: 13px; outline: none; width: 220px; transition: border .15s; box-shadow: 0 1px 2px rgba(0,0,0,.04); font-family: inherit; }
    .search-input:focus { border-color: #2563eb; }
    .search-input::placeholder { color: #94a3b8; }
    .divider { width: 1px; height: 28px; background: #e2e8f0; }
    .select-wrap { position: relative; display: inline-block; }
    .select-wrap::after { content: "▾"; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #94a3b8; font-size: 12px; }
    .filter-select { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 28px 8px 12px; color: #374151; font-size: 13px; cursor: pointer; outline: none; box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: border .15s; appearance: none; font-family: inherit; }
    .filter-select:focus { border-color: #2563eb; }
    .clear-btn { margin-left: auto; background: none; border: none; color: #94a3b8; font-size: 12px; cursor: pointer; font-weight: 500; padding: 4px 8px; border-radius: 6px; font-family: inherit; }
    .clear-btn:hover { color: #dc2626; }

    /* CALENDAR */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #1e293b; }
    .cal-title span { color: #2563eb; }
    .cal-nav { display: flex; gap: 8px; }
    .nav-btn { background: #fff; border: 1px solid #e2e8f0; color: #475569; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; box-shadow: 0 1px 2px rgba(0,0,0,.04); font-family: inherit; }
    .nav-btn:hover { border-color: #2563eb; color: #1e293b; background: #eff6ff; }
    .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .day-hdr { text-align: center; font-size: 11px; font-weight: 700; color: #94a3b8; padding: 6px 0; letter-spacing: .06em; text-transform: uppercase; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; min-height: 90px; padding: 6px; transition: border-color .15s; }
    .cal-cell:hover { border-color: #94a3b8; }
    .cal-cell.today { border-color: #2563eb !important; box-shadow: 0 0 0 2px #bfdbfe55; }
    .cal-cell.empty { background: transparent; border: none; }
    .day-num { font-size: 12px; font-weight: 500; color: #94a3b8; margin-bottom: 4px; text-align: right; }
    .cal-cell.today .day-num { font-weight: 700; color: #2563eb; }
    .ev-pill { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-weight: 500; border-left: 3px solid; transition: opacity .1s; }
    .ev-pill:hover { opacity: .75; }
    .more-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

    /* LIST */
    .list-header { display: flex; align-items: center; margin-bottom: 18px; }
    .list-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #1e293b; }
    .list-count { color: #2563eb; font-size: 16px; font-family: Inter, sans-serif; font-weight: 600; margin-left: 8px; }
    .list-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 10px; cursor: pointer; transition: all .18s; display: flex; gap: 16px; align-items: flex-start; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .list-card:hover { border-color: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .date-block { min-width: 64px; text-align: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 8px; flex-shrink: 0; }
    .date-block .day { font-size: 22px; font-weight: 700; color: #1e293b; line-height: 1; }
    .date-block .mon { font-size: 11px; color: #2563eb; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
    .date-block .range { font-size: 9px; color: #94a3b8; margin-top: 4px; }
    .card-body { flex: 1; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
    .card-title { font-weight: 600; font-size: 15px; color: #1e293b; line-height: 1.3; }
    .badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; letter-spacing: .03em; }
    .card-loc { font-size: 12px; color: #64748b; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: #64748b; line-height: 1.6; }
    .empty-state { text-align: center; padding: 60px; color: #94a3b8; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; }
    .empty-icon { font-size: 32px; margin-bottom: 10px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; max-width: 520px; width: 100%; padding: 32px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
    .modal-close { position: absolute; top: 16px; right: 16px; background: #f1f5f9; border: 1px solid #e2e8f0; color: #64748b; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .modal-badges { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin: 0 0 14px; color: #1e293b; line-height: 1.3; }
    .modal-meta { display: flex; gap: 28px; margin-bottom: 16px; flex-wrap: wrap; }
    .meta-label { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }
    .meta-val { font-size: 14px; color: #1e293b; font-weight: 500; }
    .meta-val span { color: #94a3b8; }
    .modal-divider { border: none; border-top: 1px solid #f1f5f9; margin: 16px 0; }
    .modal-desc { font-size: 14px; color: #475569; line-height: 1.7; margin-bottom: 16px; }
    .add-cal-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
    .add-cal-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .cal-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .cal-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; color: #374151; transition: all .15s; text-decoration: none; box-shadow: 0 1px 2px rgba(0,0,0,.04); font-family: inherit; }
    .cal-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    .modal-footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding-top: 16px; border-top: 1px solid #f1f5f9; }
    .visit-btn { display: inline-flex; align-items: center; gap: 6px; background: #2563eb; color: #fff; padding: 10px 22px; border-radius: 8px; font-weight: 700; font-size: 14px; text-decoration: none; }
    .visit-btn:hover { background: #1d4ed8; }
    .no-link { font-size: 13px; color: #94a3b8; font-style: italic; }
    .event-url { font-size: 12px; color: #94a3b8; word-break: break-all; }


    /* MOBILE CALENDAR — week strip + agenda */
    .mob-cal { display: none; }
    .desk-cal { display: block; }

    /* Week strip */
    .mob-cal-header { display: flex; align-items: center; justify-content: space-between; padding: 0 0 12px; }
    .mob-cal-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #1e293b; }
    .mob-cal-title span { color: #2563eb; }
    .mob-nav { display: flex; gap: 6px; }
    .mob-nav-btn { background: #fff; border: 1px solid #e2e8f0; color: #475569; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: inherit; font-weight: 600; }
    .mob-nav-btn:hover { border-color: #2563eb; color: #2563eb; }
    .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
    .week-day { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 2px; border-radius: 10px; transition: background .15s; }
    .week-day:hover { background: #f1f5f9; }
    .week-day.selected { background: #2563eb; }
    .week-day.has-events .week-dot { opacity: 1; }
    .week-lbl { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
    .week-day.selected .week-lbl { color: #bfdbfe; }
    .week-num { font-size: 17px; font-weight: 700; color: #1e293b; line-height: 1; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .week-day.selected .week-num { color: #fff; }
    .week-day.is-today .week-num { color: #2563eb; }
    .week-day.selected.is-today .week-num { color: #fff; }
    .week-dot { width: 5px; height: 5px; border-radius: 50%; background: #2563eb; opacity: 0; transition: opacity .15s; }
    .week-day.selected .week-dot { background: #fff; opacity: 1 !important; }

    /* Agenda */
    .agenda-empty { text-align: center; padding: 40px 20px; color: #94a3b8; }
    .agenda-empty-icon { font-size: 28px; margin-bottom: 8px; }
    .agenda-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: all .15s; }
    .agenda-item:hover { border-color: #2563eb; transform: translateY(-1px); }
    .agenda-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .agenda-body { flex: 1; }
    .agenda-title { font-weight: 600; font-size: 14px; color: #1e293b; margin-bottom: 3px; line-height: 1.3; }
    .agenda-loc { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .agenda-badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .agenda-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }

    /* Week nav row */
    .week-nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .week-nav-btn { background: none; border: none; color: #94a3b8; font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-family: inherit; }
    .week-nav-btn:hover { color: #2563eb; background: #eff6ff; }

    @media (max-width: 640px) {
      #app-header { padding: 0 14px; }
      .logo-sub { display: none; }
      .logo-title { font-size: 15px; }
      .view-btn { padding: 6px 12px; font-size: 12px; }
      #main { padding: 12px 14px; }
      .filter-bar { padding: 10px 12px; gap: 8px; }
      .search-input { width: 100%; }
      .filter-select { font-size: 12px; }
      /* Switch calendar views */
      .mob-cal { display: block; }
      .desk-cal { display: none; }
      /* List mobile */
      .list-card { padding: 14px; gap: 10px; }
      .date-block { min-width: 50px; padding: 7px 5px; }
      .date-block .day { font-size: 18px; }
      .date-block .mon { font-size: 10px; }
      .card-title { font-size: 14px; }
      .card-top { flex-direction: column; gap: 6px; }
      .badges { flex-direction: row; }
      /* Modal mobile */
      .modal { padding: 20px; border-radius: 12px; max-height: 95vh; }
      .modal-title { font-size: 18px; }
      .cal-btns { flex-direction: column; }
      .cal-btn { width: 100%; justify-content: center; }
    }
    /* LOADING */
    .loading { text-align: center; padding: 80px; color: #94a3b8; }
    .loading-icon { font-size: 32px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header id="app-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <div class="logo-icon">🌍</div>
        <div>
          <div class="logo-title">Africa Events</div>
          <div class="logo-sub">Pan-African Calendar</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="demo-badge" id="demo-badge" style="display:none;">Demo data — connect Baserow to go live</div>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-calendar" onclick="setView('calendar')">Calendar</button>
          <button class="view-btn" id="btn-list" onclick="setView('list')">List</button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <div id="main">

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="search-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="Search events or cities…" oninput="applyFilters()" />
      </div>
      <div class="divider"></div>
      <div class="select-wrap">
        <select class="filter-select" id="filter-category" onchange="applyFilters()">
          <option value="All">All Categories</option>
        </select>
      </div>
      <div class="select-wrap">
        <select class="filter-select" id="filter-format" onchange="applyFilters()">
          <option value="All">All Formats</option>
          <option value="In-Person">📍 In-Person</option>
          <option value="Virtual">💻 Virtual</option>
          <option value="Hybrid">🔀 Hybrid</option>
        </select>
      </div>
      <div class="select-wrap">
        <select class="filter-select" id="filter-country" onchange="applyFilters()">
          <option value="All">All Countries</option>
        </select>
      </div>
      <button class="clear-btn" id="clear-btn" style="display:none;" onclick="clearFilters()">✕ Clear filters</button>
    </div>

    <!-- VIEWS -->
    <div id="loading-state" class="loading">
      <div class="loading-icon">⏳</div>
      <div>Loading events…</div>
    </div>
    <div id="view-calendar" style="display:none;">

      <!-- DESKTOP CALENDAR -->
      <div class="desk-cal">
        <div class="cal-header">
          <h2 class="cal-title" id="cal-title">June <span>2026</span></h2>
          <div class="cal-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">← Prev</button>
            <button class="nav-btn" onclick="goToday()">Today</button>
            <button class="nav-btn" onclick="changeMonth(1)">Next →</button>
          </div>
        </div>
        <div class="day-headers">
          <div class="day-hdr">Sun</div><div class="day-hdr">Mon</div><div class="day-hdr">Tue</div>
          <div class="day-hdr">Wed</div><div class="day-hdr">Thu</div><div class="day-hdr">Fri</div><div class="day-hdr">Sat</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <!-- MOBILE CALENDAR: week strip + agenda -->
      <div class="mob-cal">
        <div class="mob-cal-header">
          <h2 class="mob-cal-title" id="mob-cal-title">June <span>2026</span></h2>
          <div class="mob-nav">
            <button class="mob-nav-btn" onclick="mobChangeMonth(-1)" title="Prev month">&#8249;</button>
            <button class="mob-nav-btn" onclick="mobGoToday()" title="Today" style="font-size:11px;font-weight:700;">Today</button>
            <button class="mob-nav-btn" onclick="mobChangeMonth(1)" title="Next month">&#8250;</button>
          </div>
        </div>
        <!-- Week navigation -->
        <div class="week-nav-row">
          <button class="week-nav-btn" onclick="mobChangeWeek(-1)">&#8249;</button>
          <span id="mob-week-label" style="font-size:12px;color:#64748b;font-weight:500;"></span>
          <button class="week-nav-btn" onclick="mobChangeWeek(1)">&#8250;</button>
        </div>
        <!-- Day strip -->
        <div class="week-strip" id="mob-week-strip"></div>
        <!-- Agenda for selected day -->
        <div id="mob-agenda"></div>
      </div>

    </div>
    <div id="view-list" style="display:none;">
      <div class="list-header" style="justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <h2 class="list-title">All Events</h2>
          <span class="list-count" id="list-count"></span>
        </div>
        <div class="select-wrap">
          <select class="filter-select" id="filter-month" onchange="applyFilters()" style="font-weight:600;">
            <option value="All">All Months</option>
          </select>
        </div>
      </div>
      <div id="list-body"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal-box">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-badges" id="modal-badges"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-meta" id="modal-meta"></div>
      <hr class="modal-divider">
      <div id="modal-desc-wrap" style="margin-bottom:16px;display:none;">
        <div class="meta-label" style="margin-bottom:6px;">About this event</div>
        <p class="modal-desc" id="modal-desc" style="margin:0;"></p>
      </div>
      <hr class="modal-divider" id="modal-desc-divider" style="display:none;">
      <div class="add-cal-box">
        <div class="add-cal-label">Add to Calendar</div>
        <div class="cal-btns" id="cal-btns"></div>
      </div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const WORKER_URL = "https://africa-events.joseph-kuuire.workers.dev/";

// ─── MOCK DATA ───────────────────────────────────────────────────────────────
const MOCK_EVENTS = [
  { id:1,  title:"Africa Tech Summit",          date:"2026-06-03", endDate:"2026-06-05", country:"Kenya",        city:"Nairobi",       category:"Technology",    format:"In-Person", description:"East Africa's largest technology gathering bringing together founders, investors, and policymakers.",                                         link:"#" },
  { id:2,  title:"Ghana Investment Forum",       date:"2026-06-08", endDate:"2026-06-08", country:"Ghana",        city:"Accra",         category:"Business",      format:"In-Person", description:"Annual forum connecting Ghanaian businesses with international investors.",                                                                  link:"#" },
  { id:3,  title:"Lagos Creative Festival",      date:"2026-06-10", endDate:"2026-06-14", country:"Nigeria",      city:"Lagos",         category:"Arts & Culture",format:"In-Person", description:"Celebrating African creative industries across film, music, fashion and visual arts.",                                                       link:"#" },

// ─── STATE ───────────────────────────────────────────────────────────────────
let allEvents = [];
let filteredEvents = [];
let currentView = "calendar";
let currentYear = 2026, currentMonth = 5; // June 2026
const today = new Date();

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  let data = null;
  if (!WORKER_URL.includes("YOUR-SUBDOMAIN")) {
    try {
      let all = [], page = 1, hasMore = true;
      while (hasMore) {
        const res = await fetch(WORKER_URL + "?page=" + page);
        if (!res.ok) break;
        const json = await res.json();
        all = all.concat(json.results || []);
        hasMore = !!json.next;
        page++;
      }
      if (all.length) {
        // Debug: log first record to console so you can verify field names
        console.log("[Africa Events] First Baserow record:", JSON.stringify(all[0]));
        // Baserow single-select fields return {value, id, color} objects
        // Country, City, Category, Format are all single-select
        const val = f => {
          if (!f) return "";
          if (typeof f === "object") return f.value || "";
          return String(f);
        };
        data = all.map(r => ({
          id: r.id,
          title: r["Event Name"] || r["Name"] || "",
          date: r["Start Date"] || "",
          endDate: r["End Date"] || r["Start Date"] || "",
          country: val(r["Country"]),
          city: val(r["City"]),
          category: val(r["Category"]) || "Other",
          format: val(r["Format"]) || "In-Person",
          description: r["Description"] || r["Notes"] || r["About"] || r["Details"] || r["Summary"] || r["Event Description"] || "",
          link: r["Link"] || r["URL"] || r["Website"] || "#",
        }));
      }
    } catch(e) { console.error(e); }
  }

  allEvents = data || MOCK_EVENTS;
  allEvents.forEach(e => allEventsById[e.id] = e);
  if (!data) document.getElementById("demo-badge").style.display = "block";

  buildFilterOptions();
  applyFilters();
  document.getElementById("loading-state").style.display = "none";
  mobGoToday();
  setView("calendar");
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function buildFilterOptions() {
  const cats = [...new Set(allEvents.map(e => e.category))].sort();
  const catSel = document.getElementById("filter-category");
  cats.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; catSel.appendChild(o); });

  const countries = ["Virtual", ...[...new Set(allEvents.map(e => e.country).filter(c => c !== "Virtual"))].sort()];
  const ctySel = document.getElementById("filter-country");
  countries.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; ctySel.appendChild(o); });

  // Build month options from actual event dates
  const monthSet = new Set();
  allEvents.forEach(ev => {
    if (ev.date && ev.date.length >= 7) {
      const d = new Date(ev.date + "T00:00:00");
      if (!isNaN(d)) monthSet.add(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2,"0"));
    }
  });
  const sortedMonths = [...monthSet].sort();
  const monSel = document.getElementById("filter-month");
  if (monSel) {
    sortedMonths.forEach(ym => {
      const [y, m] = ym.split("-");
      const o = document.createElement("option");
      o.value = ym;
      o.textContent = MONTHS[parseInt(m) - 1] + " " + y;
      monSel.appendChild(o);
    });
  }
}

function applyFilters() {
  const search = document.getElementById("search-input").value.toLowerCase();
  const cat = document.getElementById("filter-category").value;
  const fmt = document.getElementById("filter-format").value;
  const cty = document.getElementById("filter-country").value;
  const monEl = document.getElementById("filter-month");
  const mon = monEl ? monEl.value : "All";

  filteredEvents = allEvents.filter(ev => {
    if (cat !== "All" && ev.category !== cat) return false;
    if (fmt !== "All" && ev.format !== fmt) return false;
    if (cty !== "All" && ev.country !== cty) return false;
    if (search && !ev.title.toLowerCase().includes(search) && !ev.city.toLowerCase().includes(search)) return false;
    if (mon !== "All" && ev.date) {
      const d = new Date(ev.date + "T00:00:00");
      const evYM = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2,"0");
      if (evYM !== mon) return false;
    }
    return true;
  });

  const hasFilters = cat !== "All" || fmt !== "All" || cty !== "All" || search || mon !== "All";
  document.getElementById("clear-btn").style.display = hasFilters ? "block" : "none";

  if (currentView === "calendar") { renderCalendar(); renderMobCalendar(); }
  else renderList();
}

function clearFilters() {
  document.getElementById("search-input").value = "";
  document.getElementById("filter-category").value = "All";
  document.getElementById("filter-format").value = "All";
  document.getElementById("filter-country").value = "All";
  const monEl = document.getElementById("filter-month");
  if (monEl) monEl.value = "All";
  applyFilters();
}

// ─── VIEW SWITCHING ──────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("btn-calendar").classList.toggle("active", v === "calendar");
  document.getElementById("btn-list").classList.toggle("active", v === "list");
  document.getElementById("view-calendar").style.display = v === "calendar" ? "block" : "none";
  document.getElementById("view-list").style.display = v === "list" ? "block" : "none";
  if (v === "calendar") { renderCalendar(); renderMobCalendar(); }
  else renderList();
}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

function goToday() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  renderCalendar();
}

function parseDate(str) { return new Date(str + "T00:00:00"); }

function eventSpansDay(ev, day) {
  const s = parseDate(ev.date), e = parseDate(ev.endDate || ev.date);
  return day >= s && day <= e;
}

function renderCalendar() {
  // Update title
  const titleEl = document.getElementById("cal-title");
  titleEl.innerHTML = MONTHS[currentMonth] + ' <span>' + currentYear + '</span>';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    empty.className = "cal-cell empty";
    grid.appendChild(empty);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const day = new Date(currentYear, currentMonth, d);
    const isToday = day.getFullYear() === today.getFullYear() && day.getMonth() === today.getMonth() && day.getDate() === today.getDate();
    const dayEvs = filteredEvents.filter(ev => eventSpansDay(ev, day));

    const cell = document.createElement("div");
    cell.className = "cal-cell" + (isToday ? " today" : "");

    const num = document.createElement("div");
    num.className = "day-num";
    num.textContent = d;
    cell.appendChild(num);

    const shown = dayEvs.slice(0, 3);
    shown.forEach(ev => {
      const col = CAT_COLORS[ev.category] || DEFAULT_COL;
      const pill = document.createElement("div");
      pill.className = "ev-pill";
      pill.style.backgroundColor = col.bg;
      pill.style.color = col.text;
      pill.style.borderLeftColor = col.dot;
      pill.textContent = ev.title;
      pill.title = ev.title;
      pill.onclick = () => openModal(ev);
      cell.appendChild(pill);
    });

    if (dayEvs.length > 3) {
      const more = document.createElement("div");
      more.className = "more-label";
      more.textContent = "+" + (dayEvs.length - 3) + " more";
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

// ─── MOBILE CALENDAR ─────────────────────────────────────────────────────────
let mobYear = today.getFullYear(), mobMonth = today.getMonth();
let mobSelectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
let mobWeekOffset = 0; // which week within the month are we showing (0 = week containing today/1st)

function mobDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

function mobGetWeekStart() {
  // Week start = Sunday of the week containing the first visible day
  const firstOfMonth = new Date(mobYear, mobMonth, 1);
  const baseDay = new Date(mobYear, mobMonth, 1 + mobWeekOffset * 7);
  // Clamp to month
  const daysInMon = mobDaysInMonth(mobYear, mobMonth);
  const clampedDay = Math.min(baseDay.getDate(), daysInMon);
  const d = new Date(mobYear, mobMonth, clampedDay);
  // Go to Sunday of that week
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function mobChangeMonth(delta) {
  mobMonth += delta;
  if (mobMonth < 0) { mobMonth = 11; mobYear--; }
  if (mobMonth > 11) { mobMonth = 0; mobYear++; }
  mobWeekOffset = 0;
  mobSelectedDate = new Date(mobYear, mobMonth, 1);
  renderMobCalendar();
}

function mobGoToday() {
  mobYear = today.getFullYear();
  mobMonth = today.getMonth();
  mobWeekOffset = 0;
  mobSelectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  // Find which week offset today is in
  const firstOfMonth = new Date(mobYear, mobMonth, 1);
  const firstSunday = new Date(firstOfMonth);
  firstSunday.setDate(1 - firstOfMonth.getDay());
  const diff = Math.floor((today - firstSunday) / (7 * 24 * 60 * 60 * 1000));
  mobWeekOffset = Math.max(0, diff);
  renderMobCalendar();
}

function mobChangeWeek(delta) {
  mobWeekOffset += delta;
  // Move to next/prev month if we go out of bounds
  const firstSunday = new Date(mobYear, mobMonth, 1);
  firstSunday.setDate(firstSunday.getDate() - firstSunday.getDay());
  const weekStart = new Date(firstSunday);
  weekStart.setDate(weekStart.getDate() + mobWeekOffset * 7);
  if (weekStart.getMonth() !== mobMonth || weekStart.getFullYear() !== mobYear) {
    // crossed month boundary — just clamp
    if (mobWeekOffset < 0) {
      mobMonth -= 1;
      if (mobMonth < 0) { mobMonth = 11; mobYear--; }
      mobWeekOffset = 3;
    } else {
      mobMonth += 1;
      if (mobMonth > 11) { mobMonth = 0; mobYear++; }
      mobWeekOffset = 0;
    }
    mobSelectedDate = new Date(mobYear, mobMonth, 1);
  }
  renderMobCalendar();
}

function mobSelectDay(d) {
  mobSelectedDate = new Date(mobYear, mobMonth, d);
  renderMobStrip();
  renderMobAgenda();
}

function renderMobCalendar() {
  // Update title
  const t = document.getElementById("mob-cal-title");
  if (t) t.innerHTML = MONTHS[mobMonth] + ' <span>' + mobYear + '</span>';
  renderMobStrip();
  renderMobAgenda();
}

function renderMobStrip() {
  const strip = document.getElementById("mob-week-strip");
  const weekLabel = document.getElementById("mob-week-label");
  if (!strip) return;
  strip.innerHTML = "";

  const DAYS_SHORT = ["S","M","T","W","T","F","S"];
  const firstSunday = new Date(mobYear, mobMonth, 1);
  firstSunday.setDate(firstSunday.getDate() - firstSunday.getDay());
  const weekStart = new Date(firstSunday);
  weekStart.setDate(weekStart.getDate() + mobWeekOffset * 7);

  // Week label
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);
  if (weekLabel) {
    weekLabel.textContent = MONTHS[weekStart.getMonth()].slice(0,3) + " " + weekStart.getDate() +
      " – " + MONTHS[weekEnd.getMonth()].slice(0,3) + " " + weekEnd.getDate();
  }

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    const dayNum = d.getDate();
    const isThisMonth = d.getMonth() === mobMonth && d.getFullYear() === mobYear;
    const isTodayD = d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
    const isSelected = d.getFullYear()===mobSelectedDate.getFullYear()&&d.getMonth()===mobSelectedDate.getMonth()&&d.getDate()===mobSelectedDate.getDate();
    const dayEvs = filteredEvents.filter(ev => eventSpansDay(ev, d));

    const cell = document.createElement("div");
    cell.className = "week-day" + (isSelected?" selected":"") + (isTodayD?" is-today":"") + (dayEvs.length?" has-events":"");
    if (!isThisMonth) cell.style.opacity = "0.35";

    const lbl = document.createElement("div"); lbl.className = "week-lbl"; lbl.textContent = DAYS_SHORT[i]; cell.appendChild(lbl);
    const num = document.createElement("div"); num.className = "week-num"; num.textContent = dayNum; cell.appendChild(num);
    const dot = document.createElement("div"); dot.className = "week-dot"; cell.appendChild(dot);

    const capD = new Date(d);
    cell.onclick = () => { mobSelectedDate = capD; mobYear = capD.getMonth() === mobMonth ? mobYear : capD.getFullYear(); mobMonth = capD.getMonth(); renderMobStrip(); renderMobAgenda(); };
    strip.appendChild(cell);
  }
}

function renderMobAgenda() {
  const agenda = document.getElementById("mob-agenda");
  if (!agenda) return;
  agenda.innerHTML = "";

  const dayEvs = filteredEvents.filter(ev => eventSpansDay(ev, mobSelectedDate));
  const dateStr = DAYS_FULL[mobSelectedDate.getDay()] + ", " + MONTHS[mobSelectedDate.getMonth()] + " " + mobSelectedDate.getDate();

  const hdr = document.createElement("div");
  hdr.style.cssText = "font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;padding:0 2px;";
  hdr.textContent = dateStr;
  agenda.appendChild(hdr);

  if (dayEvs.length === 0) {
    const empty = document.createElement("div"); empty.className = "agenda-empty";
    empty.innerHTML = '<div class="agenda-empty-icon">📭</div><div style="font-size:14px;font-weight:500;color:#94a3b8;">No events this day</div>';
    agenda.appendChild(empty);
    return;
  }

  dayEvs.forEach(ev => {
    const col = CAT_COLORS[ev.category] || DEFAULT_COL;
    const item = document.createElement("div"); item.className = "agenda-item";
    item.onclick = () => openModal(ev);

    const dot = document.createElement("div"); dot.className = "agenda-dot";
    dot.style.backgroundColor = col.dot; item.appendChild(dot);

    const body = document.createElement("div"); body.className = "agenda-body";
    const title = document.createElement("div"); title.className = "agenda-title"; title.textContent = ev.title; body.appendChild(title);

    const loc = ev.city && ev.country ? ev.city + ", " + ev.country : (ev.country || ev.city || "");
    if (loc) { const locEl = document.createElement("div"); locEl.className = "agenda-loc"; locEl.textContent = "📍 " + loc; body.appendChild(locEl); }

    const bdgs = document.createElement("div"); bdgs.className = "agenda-badges";
    const cb = document.createElement("span"); cb.className = "agenda-badge"; cb.textContent = ev.category;
    cb.style.backgroundColor = col.bg; cb.style.color = col.text; bdgs.appendChild(cb);
    const fb = document.createElement("span"); fb.className = "agenda-badge"; fb.textContent = (FORMAT_ICONS[ev.format]||"") + " " + ev.format;
    fb.style.backgroundColor = "#f1f5f9"; fb.style.color = "#64748b"; bdgs.appendChild(fb);
    body.appendChild(bdgs);

    item.appendChild(body);
    agenda.appendChild(item);
  });
}

const DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

// ─── LIST ────────────────────────────────────────────────────────────────────
function renderList() {
  // Filter out events with no date before sorting
  const valid = filteredEvents.filter(ev => ev.date && ev.date.length >= 8);
  const sorted = valid.sort((a,b) => parseDate(a.date) - parseDate(b.date));
  document.getElementById("list-count").textContent = "(" + sorted.length + ")";
  const body = document.getElementById("list-body");
  body.innerHTML = "";

  if (sorted.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div style="font-weight:500">No events found.</div></div>';
    return;
  }

  sorted.forEach(ev => {
    const col = CAT_COLORS[ev.category] || DEFAULT_COL;
    const start = parseDate(ev.date), end = parseDate(ev.endDate || ev.date);
    const isMulti = ev.endDate && ev.date !== ev.endDate;

    const card = document.createElement("div");
    card.className = "list-card";
    card.onclick = () => openModal(ev);

    // Date block
    const db = document.createElement("div"); db.className = "date-block";
    const dayEl = document.createElement("div"); dayEl.className = "day"; dayEl.textContent = isNaN(start) ? "?" : start.getDate(); db.appendChild(dayEl);
    const monEl = document.createElement("div"); monEl.className = "mon"; monEl.textContent = isNaN(start) ? "???" : MONTHS[start.getMonth()].slice(0,3); db.appendChild(monEl);
    if (isMulti && !isNaN(end)) { const rng = document.createElement("div"); rng.className = "range"; rng.textContent = "\u2192 " + end.getDate() + " " + MONTHS[end.getMonth()].slice(0,3); db.appendChild(rng); }
    card.appendChild(db);

    // Card body
    const cb = document.createElement("div"); cb.className = "card-body";
    const ct = document.createElement("div"); ct.className = "card-top";
    const ttl = document.createElement("div"); ttl.className = "card-title"; ttl.textContent = ev.title; ct.appendChild(ttl);
    const bdgs = document.createElement("div"); bdgs.className = "badges";
    const catBadge = document.createElement("span"); catBadge.className = "badge";
    catBadge.textContent = ev.category;
    catBadge.style.backgroundColor = col.bg; catBadge.style.color = col.text;
    bdgs.appendChild(catBadge);
    const fmtBadge = document.createElement("span"); fmtBadge.className = "badge";
    fmtBadge.textContent = (FORMAT_ICONS[ev.format]||"") + " " + ev.format;
    fmtBadge.style.backgroundColor = "#f1f5f9"; fmtBadge.style.color = "#64748b";
    bdgs.appendChild(fmtBadge);
    ct.appendChild(bdgs); cb.appendChild(ct);
    const locEl = document.createElement("div"); locEl.className = "card-loc";
    const locStr = [ev.city, ev.country].filter(x => x && x !== "Online").join(", ") || (ev.country || ev.city || "");
    locEl.textContent = "\uD83D\uDCCD " + locStr;
    cb.appendChild(locEl);
    const descEl = document.createElement("div"); descEl.className = "card-desc"; descEl.textContent = ev.description || "";
    cb.appendChild(descEl);
    card.appendChild(cb);
    body.appendChild(card);
  });
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(ev) {
  const col = CAT_COLORS[ev.category] || DEFAULT_COL;
  const start = parseDate(ev.date), end = parseDate(ev.endDate || ev.date);
  const isMulti = ev.endDate && ev.date !== ev.endDate;
  const loc = [ev.city, ev.country].filter(x => x && x !== "Online").join(", ") || ev.country || ev.city || "Online";

  const mbEl = document.getElementById("modal-badges"); mbEl.innerHTML = "";
  const mb1 = document.createElement("span"); mb1.className = "badge"; mb1.textContent = ev.category;
  mb1.style.backgroundColor = col.bg; mb1.style.color = col.text; mbEl.appendChild(mb1);
  const mb2 = document.createElement("span"); mb2.className = "badge"; mb2.textContent = (FORMAT_ICONS[ev.format]||"") + " " + ev.format;
  mb2.style.backgroundColor = "#f1f5f9"; mb2.style.color = "#64748b"; mbEl.appendChild(mb2);

  document.getElementById("modal-title").textContent = ev.title;

  document.getElementById("modal-meta").innerHTML =
    '<div><div class="meta-label">Date</div><div class="meta-val">' +
      MONTHS[start.getMonth()] + ' ' + start.getDate() + ', ' + start.getFullYear() +
      (isMulti ? ' <span>→ ' + MONTHS[end.getMonth()] + ' ' + end.getDate() + ', ' + end.getFullYear() + '</span>' : '') +
    '</div></div>' +
    '<div><div class="meta-label">Location</div><div class="meta-val">' + esc(loc) + '</div></div>';

  const descText = ev.description || "";
  document.getElementById("modal-desc").textContent = descText;
  document.getElementById("modal-desc-wrap").style.display = descText ? "block" : "none";
  document.getElementById("modal-desc-divider").style.display = descText ? "block" : "none";

  // Calendar buttons
  document.getElementById("cal-btns").innerHTML =
    '<a href="' + googleCalURL(ev) + '" target="_blank" class="cal-btn">📅 Google Calendar</a>' +
    '<button class="cal-btn" onclick="downloadICS(allEventsById[' + ev.id + '])">🍎 Apple Calendar</button>' +
    '<a href="' + outlookURL(ev) + '" target="_blank" class="cal-btn">📧 Outlook</a>' +
    '<button class="cal-btn" onclick="downloadICS(allEventsById[' + ev.id + '])">📥 Download .ics</button>';

  // Footer link
  const hasLink = ev.link && ev.link !== "#";
  document.getElementById("modal-footer").innerHTML = hasLink
    ? '<a href="' + esc(ev.link) + '" target="_blank" rel="noreferrer" class="visit-btn">Visit Event Site →</a>' +
      '<span class="event-url">' + esc(ev.link) + '</span>'
    : '<span class="no-link">No event link available</span>';

  document.getElementById("modal-overlay").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modal-overlay").classList.add("hidden");
  document.body.style.overflow = "";
}

// Lookup by id - populated after data loads
const allEventsById = {};
MOCK_EVENTS.forEach(e => allEventsById[e.id] = e);

// ─── CALENDAR EXPORT ─────────────────────────────────────────────────────────
function fmtICS(d) { return d.replace(/-/g,""); }

function buildICS(ev) {
  const endObj = new Date(ev.endDate + "T00:00:00");
  endObj.setDate(endObj.getDate() + 1);
  const end = endObj.toISOString().slice(0,10).replace(/-/g,"");
  const loc = [ev.city, ev.country].filter(x => x && x !== "Online").join(", ") || ev.country || ev.city || "Online";
  return [
    "BEGIN:VCALENDAR","VERSION:2.0",
    "PRODID:-//Africa Events//Labari Media//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH","BEGIN:VEVENT",
    "UID:africa-events-" + ev.id + "@labarijournal.com",
    "SUMMARY:" + ev.title,
    "DTSTART;VALUE=DATE:" + fmtICS(ev.date),
    "DTEND;VALUE=DATE:" + end,
    "LOCATION:" + loc,
    "DESCRIPTION:" + (ev.description||"").replace(/\n/g,"\\n"),
    "URL:" + (ev.link && ev.link !== "#" ? ev.link : ""),
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
}

function downloadICS(ev) {
  const blob = new Blob([buildICS(ev)], { type:"text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = ev.title.replace(/[^a-z0-9]/gi,"-").toLowerCase() + ".ics";
  a.click();
  URL.revokeObjectURL(url);
}

function googleCalURL(ev) {
  const endObj = new Date(ev.endDate + "T00:00:00");
  endObj.setDate(endObj.getDate() + 1);
  const end = endObj.toISOString().slice(0,10).replace(/-/g,"");
  const loc = [ev.city, ev.country].filter(x => x && x !== "Online").join(", ") || ev.country || ev.city || "Online";
  return "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    "&text=" + encodeURIComponent(ev.title) +
    "&dates=" + fmtICS(ev.date) + "/" + end +
    "&details=" + encodeURIComponent(ev.description||"") +
    "&location=" + encodeURIComponent(loc);
}

function outlookURL(ev) {
  const loc = [ev.city, ev.country].filter(x => x && x !== "Online").join(", ") || ev.country || ev.city || "Online";
  return "https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent" +
    "&subject=" + encodeURIComponent(ev.title) +
    "&startdt=" + ev.date +
    "&enddt=" + (ev.endDate||ev.date) +
    "&body=" + encodeURIComponent(ev.description||"") +
    "&location=" + encodeURIComponent(loc);
}

// ─── ESCAPE HTML ─────────────────────────────────────────────────────────────
function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
